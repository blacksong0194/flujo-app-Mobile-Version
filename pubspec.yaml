name: flujo_mobile
description: FLUJO Finance OS — Mobile App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.2

  # UI
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  modal_bottom_sheet: ^3.0.0-pre

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  local_auth: ^3.0.1
  path_provider: ^2.1.4
  excel: ^4.0.3
  share_plus: ^13.1.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
dependency_overrides: 
  flutter_plugin_android_lifecycle: 2.0.34 




